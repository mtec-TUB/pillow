# Sleep Dataset Processing Configuration
# This configuration file contains all parameters for the dataset processing pipeline.
# Edit these values according to your needs.

# Dataset to process (required)
# Available options: ABC, ANPHY, APOE, APPLES, BESTAIR, CAP, CFS, CPS, DCSM, DOD-H, DOD-O,
#                    DREAMT, EESM19, EESM23, FDCSR, HMC, HOMEPAP, ISRUC, MESA, MIT-BIH, 
#                    MNC, MROS, MSP, MWT, NCHSDB, PHYSIO2018, SHHS, SLEEP-EDF, SLEEPBRL,
#                    SOF, STAGES, UCDDB, WSC
dataset: "CPS"

# Base directory where your sleep datasets are stored
base_data_dir: "/media/linda/Elements/sleep_data"

# Specific data directory (null = use automatic path from dataset definition)
data_dir: null

# Specific annotation directory (null = use automatic path from dataset definition)
ann_dir: null

# Specific output directory (null = use automatic path under base_data_dir)
output_dir: null

# Output file format
# Options: "npz" (numpy compressed), "edf" (European Data Format), "hdf5" (Hierarchical Data Format)
# - npz, hdf5: saves dictionary:
#   - x: Processed signal data array with dim [num_epochs, epoch_dur * fs]
#   - y: Sleep stage annotations (0:"Wach", 1:"N1", 2:"N2", 3:"N3", 4:"REM", 5:"MOVE", 6:"Unknown")
#   - fs: Sampling rate
#   - ch_label: Channel label (like it was originally found in the input file)
#   - file_duration Total duration of the original signal in seconds
#   - epoch_duration Duration of each epoch (def: 30 seconds)
#   - n_epochs: Number of epochs
# - edf: 
#   - saves signal and annotation in standard EDF format with annotations in the annotation channel
# - for edf and hdf5 all chosen channels will be in one file together, for npz each channel will be saved in a separate file
output_format: "edf"  # Options: "npz", "edf", "hdf5"

# Overwrite existing output files
# if false, files that exist already in the output directory will be skipped
overwrite: false

# Logging level
# Options: "INFO", "WARNING", "ERROR"
logging_level: "INFO"

# Action to perform
# Options: "process", "get_channel_names", "get_channel_types"
action: "process"

# Resample frequency in Hz (null = keep original sampling rate)
resample: 100

# Apply filtering after resampling
filter: true

# Filter frequencies to use when 'filter'=True for different signal groups (default: AASM guidelines)
# Filter format: [low_cutoff, high_cutoff] (null = no cutoff)
filter_freq:
  eeg_eog: [0.3, 35]  # EEG and EOG channels: 0.3-35 Hz
  emg: [10, null]  # EMG channels: 10+ Hz (high-pass)
  ecg: [0.3, null]  # ECG channels: 0.3+ Hz (high-pass)
  thoraco_abdo_resp: [0.1, 15]  # thoraco_abdo_resp signals: 0.1-15 Hz
  nasal_pressure: [0.03, null]  # Nasal pressure: 0.03+ Hz (high-pass)
  snoring: [10, null]  # Snoring: 10+ Hz (high-pass)
  default: [null, null]  # Default: no filtering
  
# List of specific channel names to process (empty list = process all channels)
# Example: ["C3", "C4", "EOG-L", "EOG-R", "EMG", "ECG"]
channels: []

# Epoch duration in seconds
# Options: 1, 2, 3, 5, 10, 15, 30
epoch_duration: 30

# Remove Movement epochs during processing (only if 'use_annot' is true)
rm_move: true

# Remove Unknown epochs during processing (only if 'use_annot' is true)
rm_unk: true

# Number of wake epochs to keep at start and end
# Can be a number (e.g., "60" for 30 minutes with 30s epochs) or "all"
n_wake_epochs: "60"

# How to align signal and annotation lengths
# Most datasets already have aligned signals and annotations, these options are for edge cases
# If labels do not matter for your application and you want to keep the signals as original as possible, use "match_signal" (they will only be cropped to full epochs)
# Options: "match_shorter", "match_longer", "match_signal", "match_annot"
# - match shorter one (crop the longer one at front and/or end), guarantees no padding
# - match longer one (pad signal with VALUE to match annotations (with 0, None or whatever), and/or pad annotations with VALUE to match signals(with Unknown, None or whatever))
# - match signal length (crop or pad Annot with VALUE if needed but never change signal)
# - match annot length (crop or pad signal with VALUE if needed but never change annot)

# Only usable if 'use_annot' is true
alignment: "match_shorter"

# Padding values for signal and labels when using alignment options that require padding
# Format: [signal_pad_value, label_pad_value]
# default padding will use np.nan for padded signal values and -1 for padded label values
# pad value for labels can only be an integer (already in use: {0:"Wach", 1:"N1", 2:"N2", 3:"N3", 4:"REM", 5:"MOVE", 6:"Unknown"}), recommended to choose -1 or 6 (Unknown)
pad_values: 
  signal: null
  label: -1

# Minimum required sleep epochs (N1, N2, N3, REM) after preprocessing
# Recordings with fewer sleep epochs will be discarded
# Only usable if 'use_annot' is true
min_sleep_epochs: 0 # all files included

# Use annotations
# false be used if only signals are needed for example for unsupervised tasks or if dataset has no annotations) -> save storage space
use_annot: true

